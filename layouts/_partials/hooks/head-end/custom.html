{{ if .IsHome }}
{{ with resources.Get "media/authors/me.jpg" }}
<style>
  .avatar-wrapper {
    height: auto !important;
    aspect-ratio: {{ .Width }} / {{ .Height }};
  }

  .avatar-wrapper .avatar {
    width: 100% !important;
    height: auto !important;
    object-fit: contain !important;
    border-radius: 0.75rem !important;
  }
</style>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    const avatar = document.querySelector('.avatar-wrapper .avatar');
    if (!avatar) return;

    avatar.src = {{ .RelPermalink | jsonify | safeJS }};
    avatar.removeAttribute('srcset');
    avatar.removeAttribute('sizes');
    avatar.removeAttribute('width');
    avatar.removeAttribute('height');
  });
</script>
{{ end }}
